<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="logo">LifeOS</div>
        <div class="nav-right">
            <button id="settings-trigger" class="icon-btn" aria-label="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </nav>

    <main id="app-viewport">
        
        <section id="state-home" class="app-state active">
            <div class="hero-clock-section">
                <h1 id="digital-clock">00:00</h1>
                <div class="hero-meta">
                    <span id="current-date">Loading date...</span>
                    <span class="meta-divider">•</span>
                    <span id="weather-display">--°C</span>
                </div>
            </div>

            <div class="home-grid">
                <div id="next-up-container" class="dashboard-card-panel">
                    <div class="panel-header">
                        <h2>Next Up</h2>
                        <span class="panel-badge">3 Priorities</span>
                    </div>
                    <div id="next-up-list" class="card-feed-list">
                        </div>
                </div>

                <div id="recent-updates-container" class="dashboard-card-panel">
                    <div class="panel-header">
                        <h2>Recent Activity</h2>
                    </div>
                    <div id="recent-updates-list" class="card-feed-list">
                        </div>
                </div>
            </div>
        </section>

        <section id="state-taskly" class="app-state">
            <div class="tool-header"><h2>Taskly</h2></div>
            </section>

        <section id="state-boardly" class="app-state">
            <div class="tool-header"><h2>Boardly</h2></div>
        </section>

        <section id="state-timely" class="app-state">
            <div class="tool-header"><h2>Timely</h2></div>
        </section>

        <section id="state-brainly" class="app-state">
            <div class="tool-header"><h2>Brainly</h2></div>
        </section>
    </main>

    <div id="navigation-hub">
        <button id="triangle-toggle-btn" class="triangle-btn" aria-label="Toggle Navigator">
            <span class="triangle-icon"></span>
        </button>
        <div id="tool-pill-menu" class="pill-menu hidden">
            <button class="tool-pill active" data-target="home">Home</button>
            <button class="tool-pill" data-target="taskly">Taskly</button>
            <button class="tool-pill" data-target="boardly">Boardly</button>
            <button class="tool-pill" data-target="timely">Timely</button>
            <button class="tool-pill" data-target="brainly">Brainly</button>
        </div>
    </div>

    <div id="universal-board-zone">
        <button id="universal-board-btn" class="universal-btn" aria-label="Universal Board">
            <svg class="universe-icon" viewBox="0 0 24 24" width="24" height="24">
                <circle cx="12" cy="12" r="10" fill="currentColor"/>
                <circle cx="12" cy="12" r="6" fill="#FFF"/>
                <circle cx="12" cy="12" r="2" fill="currentColor"/>
            </svg>
        </button>
        <div id="universal-board-drawer" class="universal-container hidden">
            <div class="drawer-header">
                <h3>Universal Board</h3>
            </div>
            <div id="universal-card-scroller" class="scrollable-card-vault">
                </div>
        </div>
    </div>

    <div id="voice-cognitive-shell" class="draggable-voice-widget">
        <button id="voice-anchor-btn" class="voice-bubble-trigger">
            <div class="pulse-ring"></div>
        </button>
        
        <div id="chat-interface-panel" class="chat-panel hidden">
            <div class="chat-header">
                <span>LifeOS Assistant</span>
                <button id="minimize-chat" class="text-link-btn">Minimize</button>
            </div>
            <div id="chat-history-stream" class="chat-log">
                </div>
            <div class="chat-input-bar">
                <button id="voice-mode-toggle" class="mode-action-btn" title="Toggle Voice Mode">🎤</button>
                <input type="text" id="assistant-raw-input" placeholder="Ask, command, or capture...">
                <button id="command-mode-toggle" class="mode-action-btn" title="Toggle Execution Mode">⚡</button>
            </div>
            <div id="audio-wave-feedback" class="wave-container hidden">
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            </div>
        </div>
    </div>

    <div id="global-trash-dropzone" class="trash-zone">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
